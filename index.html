<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家庭白板 - Family Whiteboard</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #f0ebe3; overflow: hidden; height: 100vh;
  display: flex; flex-direction: column; user-select: none; -webkit-user-select: none;
}

#topbar {
  display: flex; align-items: center; gap: 8px; padding: 10px 16px 22px;
  background: #fff; border-bottom: 2px solid #ddd;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06); z-index: 100; position: relative; flex-wrap: wrap;
}
#topbar .brand { font-size: 20px; font-weight: 700; color: #5b4a3f; margin-right: 12px; white-space: nowrap; }
#topbar .sep { width: 1px; height: 28px; background: #ddd; margin: 0 4px; }

.btn {
  display: inline-flex; align-items: center; gap: 5px; padding: 7px 14px;
  border: 1.5px solid #ccc; border-radius: 20px; background: #fff;
  cursor: pointer; font-size: 13px; color: #444; transition: all 0.15s; white-space: nowrap;
}
.btn:hover { background: #f5f0eb; border-color: #aaa; }
.btn.active { background: #5b4a3f; color: #fff; border-color: #5b4a3f; }
.btn.danger { border-color: #e88; color: #c44; }
.btn.danger:hover { background: #fee; }
.btn.logout-btn { border-color: #ccc; color: #888; }
.btn.logout-btn:hover { background: #f5f5f5; }

.member-pick { display: flex; align-items: center; gap: 10px; }
.member-dot {
  width: 44px; height: 44px; border-radius: 50%; border: 3px solid transparent;
  cursor: pointer; transition: transform 0.15s, border-color 0.15s;
  display: flex; align-items: center; justify-content: center;
  background: #f5f0eb; overflow: hidden; position: relative;
}
.member-dot svg { width: 36px; height: 36px; pointer-events: none; }
.member-dot:hover { transform: scale(1.18); }
.member-dot.selected { border-color: #333; transform: scale(1.12); box-shadow: 0 0 0 4px rgba(0,0,0,0.15); }
.member-dot .member-label { position: absolute; bottom: -18px; left: 50%; transform: translateX(-50%); font-size: 10px; color: #888; white-space: nowrap; pointer-events: none; }

#board {
  position: relative; flex: 1; overflow: auto; cursor: default;
  background: #fdfaf6; background-image: radial-gradient(circle, #e8dcc8 1px, transparent 1px);
  background-size: 28px 28px;
}
#boardInner {
  width: 2500px; height: 2500px; position: relative;
  transform-origin: 0 0;
}
#board.drawing-mode { cursor: crosshair; }
#board.drawing-mode .board-item { pointer-events: none; }

#drawCanvas { position: absolute; top: 0; left: 0; z-index: 10; pointer-events: none; }
#board.drawing-mode #drawCanvas { pointer-events: auto; }

#drawToolbar {
  display: none; position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: #fff; border-radius: 28px; padding: 6px 16px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15); z-index: 30; align-items: center; gap: 8px;
}
#board.drawing-mode #drawToolbar { display: flex; }

.color-swatch { width: 26px; height: 26px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; transition: transform 0.15s; }
.color-swatch:hover { transform: scale(1.2); }
.color-swatch.selected { border-color: #333; transform: scale(1.15); }
#brushSize { width: 80px; accent-color: #5b4a3f; }

.board-item {
  position: absolute; z-index: 5; box-shadow: 0 3px 12px rgba(0,0,0,0.12);
  border-radius: 8px; cursor: grab; transition: box-shadow 0.2s; touch-action: none;
  transform-origin: center center;
}
.board-item.dragging { cursor: grabbing; z-index: 50 !important; box-shadow: 0 8px 30px rgba(0,0,0,0.25); }
.board-item:hover { z-index: 20; box-shadow: 0 6px 24px rgba(0,0,0,0.18); }
.board-item.selected { outline: 3px dashed #5b4a3f; outline-offset: 4px; }
.board-item .resize-grip {
  position: absolute; bottom: 0; right: 0;
  width: 18px; height: 18px; cursor: nwse-resize;
  z-index: 5; opacity: 0; transition: opacity 0.15s;
  background: rgba(0,0,0,0.15); border-radius: 0 0 4px 0;
}
.board-item:hover .resize-grip,
.board-item.selected .resize-grip { opacity: 1; }
.resize-grip::after {
  content: ''; position: absolute; right: 2px; bottom: 2px;
  width: 8px; height: 8px;
  border-right: 2px solid #888; border-bottom: 2px solid #888;
}

.text-note {
  background: #fffaec; border: 1px solid #e8d5a3; padding: 12px 14px 22px;
  min-width: 180px; max-width: 260px; font-size: 15px; line-height: 1.5; color: #3e3028;
  white-space: pre-wrap; word-break: break-word;
}
.text-note .note-content { max-height: 180px; overflow: hidden; mask-image: linear-gradient(to bottom, black 60%, transparent 100%); -webkit-mask-image: linear-gradient(to bottom, black 60%, transparent 100%); }
.text-note .note-expand-hint { position: absolute; bottom: 22px; left: 50%; transform: translateX(-50%); font-size: 11px; color: #c0a060; pointer-events: none; }
.text-note .note-author { position: absolute; bottom: 4px; right: 12px; font-size: 11px; color: #aaa; }
.text-note .note-delete { position: absolute; top: 4px; right: 8px; font-size: 18px; color: #bbb; cursor: pointer; background: none; border: none; line-height: 1; z-index: 2; }
.text-note .note-delete:hover { color: #e55; }

.image-card { background: #111; border: none; border-radius: 8px; overflow: hidden; }
.image-card .img-wrap { position: relative; border-radius: 0; overflow: hidden; line-height: 0; }
.image-card .img-wrap img { display: block; max-width: 260px; max-height: 260px; border-radius: 0; pointer-events: none; }
.image-card .img-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0); display: flex; align-items: center; justify-content: center; transition: background 0.2s; border-radius: 0; }
.image-card .img-overlay:hover { background: rgba(0,0,0,0.25); }
.image-card .img-overlay .zoom-icon { color: #fff; font-size: 32px; opacity: 0; transition: opacity 0.2s; text-shadow: 0 2px 6px rgba(0,0,0,0.4); }
.image-card .img-overlay:hover .zoom-icon { opacity: 1; }

.media-card { background: #222; border: none; border-radius: 8px; overflow: hidden; }
.media-card .media-wrap { position: relative; border-radius: 0; overflow: hidden; line-height: 0; }
.media-card .media-wrap iframe, .media-card .media-wrap video { display: block; border: none; border-radius: 0; pointer-events: none; max-width: 300px; max-height: 200px; width: 100%; aspect-ratio: 16/9; object-fit: contain; background: #000; }
.media-card .media-wrap audio { display: block; width: 100%; min-width: 300px; pointer-events: none; }
.media-card .media-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; border-radius: 0; z-index: 2; background: rgba(0,0,0,0.12); transition: background 0.2s; }
.media-card .media-overlay:hover { background: rgba(0,0,0,0.32); }
.media-card .media-overlay .play-icon { color: #fff; font-size: 28px; text-shadow: 0 2px 8px rgba(0,0,0,0.6); transition: transform 0.2s; opacity: 0.85; }
.media-card .media-overlay:hover .play-icon { transform: scale(1.15); opacity: 1; }
.media-card.playing .media-overlay { background: rgba(0,0,0,0.02); }
.media-card.playing .media-overlay:hover { background: rgba(0,0,0,0.14); }

.media-author-badge { position: absolute; top: 4px; left: 4px; z-index: 3; padding: 3px 7px; border-radius: 4px; font-size: 11px; font-weight: 700; color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,0.4); box-shadow: 0 1px 4px rgba(0,0,0,0.3); pointer-events: none; }

.media-timeline { display: flex; align-items: center; gap: 6px; padding: 3px 6px 1px; background: #f9f9f9; border-radius: 0 0 4px 4px; cursor: default; }
.media-timeline .tl-time { font-size: 10px; color: #888; min-width: 28px; text-align: center; font-variant-numeric: tabular-nums; }
.media-timeline .tl-track { flex: 1; height: 5px; background: #e0e0e0; border-radius: 3px; position: relative; cursor: pointer; }
.media-timeline .tl-track:hover { height: 7px; }
.media-timeline .tl-progress { position: absolute; left: 0; top: 0; height: 100%; background: #5b4a3f; border-radius: 3px; pointer-events: none; }
.media-timeline .tl-thumb { position: absolute; top: 50%; transform: translate(-50%, -50%); width: 11px; height: 11px; background: #5b4a3f; border-radius: 50%; pointer-events: none; opacity: 0; }
.media-timeline .tl-track:hover .tl-thumb { opacity: 1; }

.media-card.audio-card { background: #faf7f2; }
.media-card.audio-card .media-wrap { padding: 20px 16px 12px; text-align: center; background: #faf7f2; border-radius: 0; min-width: 280px; min-height: 90px; position: relative; }
.media-card.audio-card .media-overlay { background: rgba(255,255,255,0.45); flex-direction: column; gap: 8px; border-radius: 0; }
.media-card.audio-card .media-overlay .play-icon { font-size: 28px; color: #5b4a3f; text-shadow: none; }
.media-card.audio-card .media-overlay small { color: #888; font-size: 11px; }
.media-card.audio-card.playing .media-overlay { background: rgba(255,255,255,0.2); }
.media-card.audio-card .media-author-badge { position: absolute; top: 8px; left: 8px; }

.item-actions { display: flex; justify-content: flex-end; align-items: center; padding: 2px 6px 1px; background: #fafafa; }
.item-author { font-size: 11px; color: #999; padding: 2px 4px; }
.item-delete-btn { background: none; border: none; font-size: 16px; color: #bbb; cursor: pointer; padding: 0 4px; z-index: 2; }
.item-delete-btn:hover { color: #e55; }

#lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 500; justify-content: center; align-items: center; flex-direction: column; }
#lightbox.show { display: flex; }
#lightbox img { max-width: 92vw; max-height: 85vh; border-radius: 6px; box-shadow: 0 10px 50px rgba(0,0,0,0.5); cursor: default; }
#lightbox .lb-text { max-width: 700px; max-height: 75vh; overflow-y: auto; background: #fffaec; border-radius: 12px; padding: 36px 40px; font-size: 20px; line-height: 1.8; color: #3e3028; white-space: pre-wrap; word-break: break-word; box-shadow: 0 10px 50px rgba(0,0,0,0.5); cursor: default; }
#lightbox .lb-close { position: absolute; top: 20px; right: 30px; background: none; border: none; color: #fff; font-size: 36px; cursor: pointer; opacity: 0.7; z-index: 2; }
#lightbox .lb-close:hover { opacity: 1; }
#lightbox .lb-info { color: #ccc; margin-top: 12px; font-size: 13px; }

#loginScreen { display: flex; position: fixed; inset: 0; background: #f0ebe3; z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
#loginScreen.hidden { display: none; }
#loginScreen .login-card { background: #fff; border-radius: 20px; padding: 40px 36px 32px; box-shadow: 0 8px 40px rgba(0,0,0,0.12); text-align: center; max-width: 440px; width: 92vw; }
#loginScreen .login-title { font-size: 24px; font-weight: 700; color: #5b4a3f; margin-bottom: 6px; }
#loginScreen .login-sub { font-size: 14px; color: #999; margin-bottom: 28px; }
#loginScreen .login-avatars { display: flex; justify-content: center; gap: 20px; margin-bottom: 24px; flex-wrap: wrap; }
#loginScreen .login-avatar { width: 64px; height: 64px; border-radius: 50%; border: 3px solid transparent; cursor: pointer; transition: transform 0.15s, border-color 0.15s; overflow: hidden; background: #f5f0eb; }
#loginScreen .login-avatar:hover { transform: scale(1.1); }
#loginScreen .login-avatar.selected { border-color: #333; box-shadow: 0 0 0 4px rgba(0,0,0,0.12); }
#loginScreen .login-avatar svg { width: 52px; height: 52px; pointer-events: none; margin: 6px; }
#loginScreen .login-avatar-label { font-size: 12px; color: #888; margin-top: 4px; text-align: center; }
#loginScreen .login-avatar-wrap { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
#loginScreen .login-pw-row { display: flex; gap: 8px; justify-content: center; margin-top: 8px; }
#loginScreen .login-pw-row input { padding: 10px 16px; border: 1.5px solid #ddd; border-radius: 10px; font-size: 16px; width: 160px; text-align: center; letter-spacing: 4px; }
#loginScreen .login-pw-row input:focus { outline: none; border-color: #5b4a3f; }
#loginScreen .login-error { color: #e55; font-size: 13px; margin-top: 8px; min-height: 20px; }
#loginScreen .login-btn { margin-top: 4px; padding: 10px 40px; border: none; border-radius: 24px; background: #5b4a3f; color: #fff; font-size: 15px; cursor: pointer; }
#loginScreen .login-btn:hover { background: #3e2e26; }

.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; justify-content: center; align-items: center; }
.modal-overlay.show { display: flex; }
.modal { background: #fff; border-radius: 16px; padding: 28px 32px; width: 480px; max-width: 94vw; max-height: 88vh; overflow-y: auto; box-shadow: 0 10px 40px rgba(0,0,0,0.25); }
.modal h3 { margin-bottom: 18px; color: #3e3028; font-size: 18px; }
.modal textarea { width: 100%; height: 120px; border: 1.5px solid #ddd; border-radius: 10px; padding: 12px; font-size: 15px; font-family: inherit; resize: vertical; }
.modal textarea:focus { outline: none; border-color: #5b4a3f; }
.modal input[type="text"], .modal input[type="url"], .modal input[type="password"] { width: 100%; padding: 10px 12px; border: 1.5px solid #ddd; border-radius: 10px; font-size: 14px; }
.modal input:focus { outline: none; border-color: #5b4a3f; }
.modal .modal-btns { display: flex; justify-content: flex-end; gap: 8px; margin-top: 18px; }

.modal-tabs { display: flex; gap: 0; margin-bottom: 14px; border-bottom: 2px solid #eee; }
.modal-tab { padding: 8px 18px; border: none; background: none; font-size: 14px; color: #999; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; }
.modal-tab.active { color: #5b4a3f; border-bottom-color: #5b4a3f; font-weight: 600; }
.modal-tab:hover { color: #5b4a3f; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

.file-drop-zone { border: 2px dashed #ccc; border-radius: 10px; padding: 30px; text-align: center; color: #999; margin: 4px 0 12px; cursor: pointer; }
.file-drop-zone:hover, .file-drop-zone.dragover { border-color: #5b4a3f; background: #faf7f2; color: #5b4a3f; }
.file-drop-zone input[type="file"] { display: none; }
.preview-area { margin-top: 10px; text-align: center; }
.preview-area img, .preview-area video, .preview-area audio { max-width: 100%; max-height: 150px; border-radius: 6px; }

#toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 10px 24px; border-radius: 24px; font-size: 14px; z-index: 999; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
#toast.show { opacity: 1; }
#hint { position: absolute; bottom: 70px; left: 50%; transform: translateX(-50%); color: #bbb; font-size: 13px; pointer-events: none; transition: opacity 0.5s; }
</style>
</head>
<body>

<!-- Login -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-title">家庭白板</div>
    <div class="login-sub">选择你的身份</div>
    <div class="login-avatars" id="loginAvatars"></div>
    <div class="login-pw-row" id="loginPwRow" style="display:none;">
      <input type="password" id="loginPassword" placeholder="输入密码" maxlength="20">
    </div>
    <div class="login-error" id="loginError"></div>
    <button class="login-btn" id="loginBtn" style="display:none;">进入白板</button>
  </div>
</div>

<!-- Topbar -->
<div id="topbar">
  <span class="brand">家庭白板</span>
  <span class="sep"></span>
  <span style="font-size:12px;color:#888;margin-right:4px;">当前:</span>
  <span id="currentUserTag" style="font-weight:700;font-size:14px;"></span>
  <button class="btn" id="btnChangePw" style="font-size:11px;padding:4px 10px;display:none;">修改密码</button>
  <span class="sep"></span>
  <div class="member-pick" id="memberPick"></div>
  <span class="sep"></span>
  <button class="btn" id="btnText">便签</button>
  <button class="btn" id="btnImage">图片</button>
  <button class="btn" id="btnVideo">视频</button>
  <button class="btn" id="btnAudio">音频</button>
  <button class="btn" id="btnDraw">涂鸦</button>
  <span class="sep"></span>
  <button class="btn danger" id="btnClear">清空</button>
  <span style="flex:1;"></span>
  <button class="btn logout-btn" id="btnLogout">退出</button>
  <span id="syncStatus" style="font-size:11px;color:#aaa;">本地模式</span>
</div>

<!-- Board -->
<div id="board">
  <div id="boardInner">
    <canvas id="drawCanvas"></canvas>
</div>
  <div id="drawToolbar">
    <span style="font-size:12px;color:#666;">画笔:</span>
    <span id="colorSwatches"></span>
    <span style="font-size:12px;color:#666;margin-left:8px;">粗细:</span>
    <input type="range" id="brushSize" min="1" max="20" value="4">
    <button class="btn" id="btnUndo">撤销</button>
    <button class="btn" id="btnEraser">橡皮</button>
    <button class="btn" id="btnDrawDone">完成</button>
  </div>
  <div id="hint">拖拽移动卡片，点击放大文字/播放媒体</div>
</div>

<!-- Lightbox -->
<div id="lightbox">
  <button class="lb-close">&times;</button>
  <img id="lightboxImg" src="" alt="" style="display:none;">
  <div class="lb-text" id="lightboxText" style="display:none;"></div>
  <div class="lb-info" id="lightboxInfo"></div>
</div>

<!-- Text Modal -->
<div class="modal-overlay" id="textModal">
  <div class="modal"><h3>写一张便签</h3>
    <textarea id="textInput" placeholder="想对家人说什么..."></textarea>
    <div class="modal-btns"><button class="btn" id="textCancel">取消</button><button class="btn active" id="textConfirm">贴上去</button></div>
  </div>
</div>

<!-- Image Modal -->
<div class="modal-overlay" id="imageModal">
  <div class="modal"><h3>分享图片</h3>
    <div class="modal-tabs"><button class="modal-tab active" data-tab="img-local">本地文件</button><button class="modal-tab" data-tab="img-url">网络链接</button></div>
    <div class="tab-panel active" id="img-local"><div class="file-drop-zone" id="imgDropZone">点击或拖拽图片<input type="file" id="imgFileInput" accept="image/*"></div></div>
    <div class="tab-panel" id="img-url"><input type="text" id="imgUrlInput" placeholder="粘贴图片链接 https://..."></div>
    <div class="preview-area" id="imgPreview"></div>
    <div class="modal-btns"><button class="btn" id="imageCancel">取消</button><button class="btn active" id="imageConfirm">贴上去</button></div>
  </div>
</div>

<!-- Video Modal -->
<div class="modal-overlay" id="videoModal">
  <div class="modal"><h3>分享视频</h3>
    <div class="modal-tabs"><button class="modal-tab active" data-tab="vid-local">本地文件</button><button class="modal-tab" data-tab="vid-url">网络链接</button></div>
    <div class="tab-panel active" id="vid-local"><div class="file-drop-zone" id="vidDropZone">点击或拖拽视频<input type="file" id="vidFileInput" accept="video/*"></div></div>
    <div class="tab-panel" id="vid-url"><input type="text" id="vidUrlInput" placeholder="YouTube / Bilibili / 视频链接..."></div>
    <div class="preview-area" id="vidPreview"></div>
    <div class="modal-btns"><button class="btn" id="videoCancel">取消</button><button class="btn active" id="videoConfirm">贴上去</button></div>
  </div>
</div>

<!-- Audio Modal -->
<div class="modal-overlay" id="audioModal">
  <div class="modal"><h3>分享音频</h3>
    <div class="modal-tabs"><button class="modal-tab active" data-tab="aud-local">本地文件</button><button class="modal-tab" data-tab="aud-url">网络链接</button></div>
    <div class="tab-panel active" id="aud-local"><div class="file-drop-zone" id="audDropZone">点击或拖拽音频<input type="file" id="audFileInput" accept="audio/*,.m4a,.aac,.mp3,.wav,.ogg,.flac"></div></div>
    <div class="tab-panel" id="aud-url"><input type="text" id="audUrlInput" placeholder="音频链接 https://..."></div>
    <div class="preview-area" id="audPreview"></div>
    <div class="modal-btns"><button class="btn" id="audioCancel">取消</button><button class="btn active" id="audioConfirm">贴上去</button></div>
  </div>
</div>

<!-- Password Modal -->
<div class="modal-overlay" id="pwModal">
  <div class="modal"><h3>修改密码 — <span id="pwMemberName"></span></h3>
    <input type="password" id="pwOld" placeholder="当前密码" maxlength="20" style="margin-bottom:8px;">
    <input type="password" id="pwNew1" placeholder="新密码" maxlength="20" style="margin-bottom:8px;">
    <input type="password" id="pwNew2" placeholder="再输一次新密码" maxlength="20">
    <div style="color:#e55;font-size:13px;margin-top:6px;min-height:20px;" id="pwError"></div>
    <div class="modal-btns"><button class="btn" id="pwCancel">取消</button><button class="btn active" id="pwConfirm">确认修改</button></div>
  </div>
</div>

<div id="toast"></div>

// ═══ Login ═══
function buildLoginScreen() {
  var av = document.getElementById('loginAvatars'); av.innerHTML = '';
  members.forEach(function(m, i) {
    var w = document.createElement('div'); w.className = 'login-avatar-wrap';
    w.innerHTML = '<div class="login-avatar">' + getMemberSvg(m.id) + '</div><div class="login-avatar-label">' + m.name + '</div>';
    w.onclick = function() { pickLoginMember(i); };
    av.appendChild(w);
  });
}
var selectedLoginMember = null;
function pickLoginMember(idx) {
  selectedLoginMember = idx;
  var avs = document.querySelectorAll('#loginAvatars .login-avatar');
  avs.forEach(function(a, i) { a.classList.toggle('selected', i === idx); });
  document.getElementById('loginPwRow').style.display = 'flex';
  document.getElementById('loginBtn').style.display = 'inline-block';
  document.getElementById('loginError').textContent = '';
  document.getElementById('loginPassword').value = ''; document.getElementById('loginPassword').focus();
}
function getMemberPassword(memberId) {
  try { var s = localStorage.getItem('whiteboard_pw_' + memberId); if (s) return s; } catch(e) {}
  var m = members.find(function(x) { return x.id === memberId; });
  return m ? m.password : '';
}
function setMemberPassword(memberId, pw) { try { localStorage.setItem('whiteboard_pw_' + memberId, pw); } catch(e) {} }
function doLogin() {
  if (selectedLoginMember === null) { document.getElementById('loginError').textContent = '请先选择你的身份'; return; }
  var pw = document.getElementById('loginPassword').value.trim();
  var member = members[selectedLoginMember];
  if (pw === getMemberPassword(member.id)) {
    loggedIn = true; currentMember = member;
    try { localStorage.setItem('whiteboard_login', member.id); } catch(e) {}
    loginScreen.classList.add('hidden');
    var tag = document.getElementById('currentUserTag'); tag.textContent = member.name; tag.style.color = member.color;
    document.getElementById('memberPick').style.display = 'none';
    document.getElementById('btnLogout').style.display = '';
    document.getElementById('btnChangePw').style.display = '';
    init();
  } else { document.getElementById('loginError').textContent = '密码不对，再试一次'; document.getElementById('loginPassword').value = ''; document.getElementById('loginPassword').focus(); }
}
function doLogout() {
  loggedIn = false; currentMember = members[0];
  try { localStorage.removeItem('whiteboard_login'); } catch(e) {}
  clearBoardDOM(); items = []; drawings = []; ctx.clearRect(0, 0, canvas.width, canvas.height);
  loginScreen.classList.remove('hidden');
  document.getElementById('currentUserTag').textContent = ''; document.getElementById('currentUserTag').style.color = '';
  document.getElementById('memberPick').style.display = '';
  document.getElementById('btnLogout').style.display = 'none';
  document.getElementById('btnChangePw').style.display = 'none';
  document.getElementById('syncStatus').textContent = '';
  selectedLoginMember = null;
  document.getElementById('loginPwRow').style.display = 'none';
  document.getElementById('loginBtn').style.display = 'none';
  document.getElementById('loginPassword').value = '';
  document.getElementById('loginError').textContent = '';
  document.querySelectorAll('#loginAvatars .login-avatar').forEach(function(a) { a.classList.remove('selected'); });
}
document.getElementById('loginBtn').onclick = doLogin;
document.getElementById('loginPassword').addEventListener('keydown', function(e) { if (e.key === 'Enter') doLogin(); });
document.getElementById('btnLogout').onclick = function() { if (confirm('确定要退出吗？')) doLogout(); };
document.getElementById('btnChangePw').onclick = function() {
  document.getElementById('pwMemberName').textContent = currentMember.name;
  document.getElementById('pwOld').value = ''; document.getElementById('pwNew1').value = ''; document.getElementById('pwNew2').value = '';
  document.getElementById('pwError').textContent = ''; document.getElementById('pwModal').classList.add('show'); document.getElementById('pwOld').focus();
};
document.getElementById('pwCancel').onclick = function() { document.getElementById('pwModal').classList.remove('show'); };
document.getElementById('pwConfirm').onclick = function() {
  var op = document.getElementById('pwOld').value.trim(), n1 = document.getElementById('pwNew1').value.trim(), n2 = document.getElementById('pwNew2').value.trim();
  var err = document.getElementById('pwError');
  if (op !== getMemberPassword(currentMember.id)) { err.textContent = '当前密码不对'; return; }
  if (n1.length < 1) { err.textContent = '新密码不能为空'; return; }
  if (n1 !== n2) { err.textContent = '两次输入的新密码不一致'; return; }
  setMemberPassword(currentMember.id, n1);
  document.getElementById('pwModal').classList.remove('show');
  toast('密码修改成功！');
};

// ═══ Init ═══
function init() {
  if (initCalled) { reloadBoard(); return; }
  initCalled = true;
  buildMemberPicker(); resizeCanvas();
  window.addEventListener('resize', resizeCanvas);
  setTimeout(function() { if (hint) hint.style.opacity = '0'; }, 10000);
  setSyncStatus('连接中...');
  try {
    firebase.initializeApp(firebaseConfig);
    db = firebase.database();
    itemsRef = db.ref(BOARD_PATH + '/items');
    drawingsRef = db.ref(BOARD_PATH + '/drawings');
    firebaseReady = true;
    drawingsRef.once('value').then(function(snap) { drawings = []; snap.forEach(function(c) { drawings.push(c.val()); }); redrawCanvas(); }).catch(function() {});
    itemsRef.once('value').then(function(snap) {
      clearBoardDOM(); items = [];
      snap.forEach(function(c) { var it = c.val(); items.push(it); renderItem(it); });
      if (items.length > 0) zCounter = Math.max.apply(null, items.map(function(i) { return i.z || 0; }).concat([10])) + 1;
      startFirebaseListeners();
      setSyncStatus('已同步');
    }).catch(function() { loadBoardLocal(); setSyncStatus('本地模式(离线)'); });
  } catch(e) { loadBoardLocal(); setSyncStatus('本地模式'); }
}
function reloadBoard() {
  clearBoardDOM();
  if (firebaseReady && itemsRef) {
    itemsRef.once('value').then(function(snap) { items = []; snap.forEach(function(c) { var it = c.val(); items.push(it); renderItem(it); }); }).catch(function() { loadBoardLocal(); });
  } else { loadBoardLocal(); }
}
function resizeCanvas() { canvas.width = boardInner.clientWidth; canvas.height = boardInner.clientHeight; redrawCanvas(); }
function setSyncStatus(t) { document.getElementById('syncStatus').textContent = t; }
function clearBoardDOM() { boardInner.querySelectorAll('.board-item').forEach(function(el) { if (el._tlCleanup) el._tlCleanup(); if (el._cleanup) el._cleanup(); el.remove(); }); }

function buildMemberPicker() {
  var pick = document.getElementById('memberPick'); pick.innerHTML = '';
  members.forEach(function(m, i) {
    var dot = document.createElement('span'); dot.className = 'member-dot' + (i === 0 ? ' selected' : '');
    dot.style.position = 'relative'; dot.title = m.name;
    dot.innerHTML = getMemberSvg(m.id) + '<span class="member-label">' + m.name + '</span>';
    dot.onclick = function() { selectMember(i); };
    pick.appendChild(dot);
  });
}
function selectMember(idx) { if (!loggedIn) return; currentMember = members[idx]; document.querySelectorAll('.member-dot').forEach(function(d, i) { d.classList.toggle('selected', i === idx); }); }

function toast(msg) { var t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); clearTimeout(t._to); t._to = setTimeout(function() { t.classList.remove('show'); }, 2000); }

// ═══ Drawing ═══
function toggleDrawMode() {
  drawingMode = !drawingMode;
  board.classList.toggle('drawing-mode', drawingMode);
  document.getElementById('btnDraw').classList.toggle('active', drawingMode);
  if (!drawingMode) finishStroke();
}
function startStroke(e) { if (!drawingMode) return; isDrawing = true; var r = canvas.getBoundingClientRect(); lastX = (e.clientX - r.left) / boardZoom + board.scrollLeft / boardZoom; lastY = (e.clientY - r.top) / boardZoom + board.scrollTop / boardZoom; }
function continueStroke(e) { if (!isDrawing || !drawingMode) return; var r = canvas.getBoundingClientRect(), x = (e.clientX - r.left) / boardZoom + board.scrollLeft / boardZoom, y = (e.clientY - r.top) / boardZoom + board.scrollTop / boardZoom; ctx.lineWidth = isErasing ? brushSize*3 : brushSize; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.strokeStyle = isErasing ? '#fdfaf6' : drawColor; ctx.globalCompositeOperation = isErasing ? 'destination-out' : 'source-over'; ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(x, y); ctx.stroke(); lastX = x; lastY = y; }
function finishStroke() { if (isDrawing) { isDrawing = false; ctx.globalCompositeOperation = 'source-over'; saveDrawings(); } }
function redrawCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); drawings.forEach(function(d) { var img = new Image(); img.onload = function() { ctx.drawImage(img, 0, 0); }; img.src = d; }); }

var drawColors = ['#333','#e74c3c','#e67e22','#f1c40f','#2ecc71','#3498db','#9b59b6','#1abc9c','#e91e63','#795548'];
function buildColorSwatches() {
  var w = document.getElementById('colorSwatches');
  drawColors.forEach(function(c) {
    var s = document.createElement('span'); s.className = 'color-swatch' + (c===drawColor?' selected':'');
    s.style.background = c; s.onclick = function() { isErasing = false; drawColor = c;
      document.getElementById('btnEraser').classList.remove('active');
      document.querySelectorAll('.color-swatch').forEach(function(el) { el.classList.remove('selected'); });
      s.classList.add('selected'); };
    w.appendChild(s);
  });
}

// ═══ Board items ═══
function createBoardItem(type, data) {
  var item = { id: Date.now(), type: type, x: 60+Math.random()*500, y: 60+Math.random()*400, z: zCounter++, scale: 1 };
  for (var k in data) if (data.hasOwnProperty(k)) item[k] = data[k];
  items.push(item); renderItem(item); saveBoard(); return item;
}
function renderItem(item) {
  var el = document.createElement('div'); el.className = 'board-item ' + itemCss(item.type); el.id = 'item-' + item.id;
  el.style.left = item.x + 'px'; el.style.top = item.y + 'px'; el.style.zIndex = item.z;
  if (item.scale && item.scale !== 1) el.style.transform = 'scale(' + item.scale + ')';
  var member = members.find(function(m) { return m.id === item.memberId; }) || members[0];

  if (item.type === 'text') {
    el.classList.add('text-note'); el.style.borderLeftColor = member.color; el.style.borderLeftWidth = '4px';
    el.innerHTML = '<button class="note-delete">&times;</button><div class="note-content">' + escapeHtml(item.content) + '</div><div class="note-expand-hint">点击查看全文</div><span class="note-author" style="color:' + member.color + '">' + member.name + '</span>';
    setTimeout(function() { var nc = el.querySelector('.note-content'), hi = el.querySelector('.note-expand-hint'); if (nc && hi && nc.scrollHeight <= nc.clientHeight+4) hi.style.display = 'none'; }, 0);
  }
  if (item.type === 'image') {
    el.classList.add('image-card');
    el.innerHTML = '<div class="img-wrap"><img src="' + item.src + '" alt="photo"><div class="img-overlay"><div class="media-author-badge" style="background:' + member.color + '">' + member.name + '</div><span class="zoom-icon">&#x1F50D;</span></div></div><div class="item-actions"><button class="item-delete-btn">&times;</button></div>';
  }
  if (item.type === 'video') {
    el.classList.add('media-card'); el.classList.add('video-card');
    if (item.subtype === 'local' && item.src) {
      el.innerHTML = '<div class="media-wrap"><video src="' + item.src + '" preload="metadata" playsinline></video><div class="media-overlay"><div class="media-author-badge" style="background:' + member.color + '">' + member.name + '</div><span class="play-icon">&#9654;</span></div></div><div class="media-timeline"><span class="tl-time tl-current">0:00</span><div class="tl-track"><div class="tl-progress" style="width:0%"></div><div class="tl-thumb" style="left:0%"></div></div><span class="tl-time tl-duration">0:00</span></div><div class="item-actions"><button class="item-delete-btn">&times;</button></div>';
    } else {
      var embed = getVideoEmbed(item.url||item.src, 300, 169);
      if (embed) {
        el.innerHTML = '<div class="media-wrap">' + embed + '<div class="media-overlay"><div class="media-author-badge" style="background:' + member.color + '">' + member.name + '</div><span class="play-icon">&#9654;</span></div></div><div class="item-actions"><button class="item-delete-btn">&times;</button></div>';
      } else {
        el.innerHTML = '<div style="padding:16px;color:#888;text-align:center;"><a href="' + escapeHtml(item.url||item.src) + '" target="_blank" style="color:#5b4a3f;">点击查看视频</a></div><div class="item-actions"><span class="item-author" style="color:' + member.color + '">' + member.name + '</span><button class="item-delete-btn">&times;</button></div>';
      }
    }
  }
  if (item.type === 'audio') {
    el.classList.add('media-card'); el.classList.add('audio-card');
    var aname = item.filename || '音频';
    if (item.subtype === 'local' && item.src) {
      el.innerHTML = '<div class="media-wrap"><audio src="' + item.src + '" preload="metadata"></audio><div class="media-overlay"><div class="media-author-badge" style="background:' + member.color + '">' + member.name + '</div><span class="play-icon">&#x1F3B5;</span><small>' + escapeHtml(aname) + '</small></div></div><div class="media-timeline"><span class="tl-time tl-current">0:00</span><div class="tl-track"><div class="tl-progress" style="width:0%"></div><div class="tl-thumb" style="left:0%"></div></div><span class="tl-time tl-duration">0:00</span></div><div class="item-actions"><button class="item-delete-btn">&times;</button></div>';
    } else {
      el.innerHTML = '<div class="media-wrap"><audio src="' + (item.url||item.src) + '" preload="metadata"></audio><div class="media-overlay"><div class="media-author-badge" style="background:' + member.color + '">' + member.name + '</div><span class="play-icon">&#x1F3B5;</span><small>' + escapeHtml(aname) + '</small></div></div><div class="media-timeline"><span class="tl-time tl-current">0:00</span><div class="tl-track"><div class="tl-progress" style="width:0%"></div><div class="tl-thumb" style="left:0%"></div></div><span class="tl-time tl-duration">0:00</span></div><div class="item-actions"><button class="item-delete-btn">&times;</button></div>';
    }
  }

  // Unified drag+click + pinch-to-zoom + mouse resize
  var DRAG = 4, sx, sy, ox, oy, moved, active;
  var pinchDist0, pinchScale0, pinchActive;
  var resizeActive, resizeSx, resizeSy, resizeScale0;

  function td(a, b) { var dx = a.clientX - b.clientX, dy = a.clientY - b.clientY; return Math.sqrt(dx*dx + dy*dy); }

  function onDown(e) {
    if (drawingMode) return;
    // Mouse resize via grip
    if (e.target.closest('.resize-grip')) {
      e.preventDefault(); e.stopPropagation();
      resizeActive = true; active = false; pinchActive = false;
      resizeSx = e.clientX; resizeSy = e.clientY; resizeScale0 = item.scale || 1;
      document.querySelectorAll('.board-item.selected').forEach(function(s) { s.classList.remove('selected'); });
      el.classList.add('selected'); el.classList.add('dragging');
      item.z = zCounter++; el.style.zIndex = item.z;
      return;
    }
    if (e.target.closest('button, a')) return;
    e.preventDefault(); e.stopPropagation();
    var pt = e.touches ? e.touches[0] : e;
    sx = pt.clientX; sy = pt.clientY; ox = item.x; oy = item.y;
    moved = false; active = true; pinchActive = false; resizeActive = false;
    document.querySelectorAll('.board-item.selected').forEach(function(s) { s.classList.remove('selected'); });
    el.classList.add('selected'); item.z = zCounter++; el.style.zIndex = item.z;
    el.classList.add('dragging');
  }

  function onMove(e) {
    if (drawingMode) return;
    // Mouse resize
    if (resizeActive) {
      e.preventDefault();
      var dx = e.clientX - resizeSx, dy = e.clientY - resizeSy;
      var delta = Math.max(dx, dy);
      var s = Math.max(0.3, Math.min(3.5, resizeScale0 + delta * 0.004));
      item.scale = s; el.style.transform = 'scale(' + s + ')';
      return;
    }
    // Pinch-to-zoom
    if (e.touches && e.touches.length >= 2) {
      if (!pinchActive) { active = false; pinchActive = true; pinchDist0 = td(e.touches[0], e.touches[1]); pinchScale0 = item.scale || 1; }
      e.preventDefault();
      var d = td(e.touches[0], e.touches[1]);
      var r2 = 1 + (d / pinchDist0 - 1) * 0.3;
      var s = Math.max(0.3, Math.min(3.5, pinchScale0 * r2));
      item.scale = s; el.style.transform = 'scale(' + s + ')';
      return;
    }
    // Drag
    if (!active) return;
    e.preventDefault();
    var pt = e.touches ? e.touches[0] : e, dx2 = pt.clientX - sx, dy2 = pt.clientY - sy;
    if (!moved && (Math.abs(dx2) > DRAG || Math.abs(dy2) > DRAG)) moved = true;
    if (!moved) return;
    item.x = ox + dx2; item.y = oy + dy2;
    el.style.left = item.x + 'px'; el.style.top = item.y + 'px';
  }

  function onUp(e) {
    if (resizeActive) { resizeActive = false; el.classList.remove('dragging'); saveItemToFirebase(item); return; }
    if (pinchActive) { pinchActive = false; el.classList.remove('dragging'); saveItemToFirebase(item); return; }
    if (!active) return;
    active = false; el.classList.remove('dragging');
    if (!moved) {
      if (item.type === 'text') openTextLightbox(item.content, member);
      if (item.type === 'image') openImageLightbox(item.src, member);
      if (item.type === 'video' || item.type === 'audio') playMedia(el, item);
    } else saveItemToFirebase(item);
  }

  el.addEventListener('mousedown', onDown); el.addEventListener('touchstart', onDown, {passive:false});
  document.addEventListener('mousemove', onMove); document.addEventListener('mouseup', onUp);
  document.addEventListener('touchmove', onMove, {passive:false}); document.addEventListener('touchend', onUp); document.addEventListener('touchcancel', onUp);
  el._cleanup = function() { el.removeEventListener('mousedown', onDown); el.removeEventListener('touchstart', onDown); document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); document.removeEventListener('touchmove', onMove); document.removeEventListener('touchend', onUp); document.removeEventListener('touchcancel', onUp); };

  var delBtn = el.querySelector('.item-delete-btn, .note-delete');
  if (delBtn) delBtn.onclick = function(ev) { ev.stopPropagation(); ev.preventDefault(); deleteItem(item.id); };
  // Resize grip
  var grip = document.createElement('div'); grip.className = 'resize-grip'; el.appendChild(grip);

  boardInner.appendChild(el);

  // Auto-adapt video aspect ratio
  if (item.type === 'video' && item.subtype === 'local') {
    setTimeout(function() {
      var v = el.querySelector('video'); if (!v) return;
      function sa() { if (v.videoWidth && v.videoHeight) { v.style.aspectRatio = v.videoWidth + '/' + v.videoHeight; v.style.width = 'auto'; v.style.maxWidth = '300px'; v.style.maxHeight = '200px'; } }
      if (v.videoWidth) sa(); else v.addEventListener('loadedmetadata', sa, {once:true});
    }, 0);
  }
}
function itemCss(t) { if (t==='text') return 'text-note'; if (t==='image') return 'image-card'; if (t==='video') return 'media-card video-card'; if (t==='audio') return 'media-card audio-card'; return ''; }
function deleteItem(id) { items = items.filter(function(i) { return i.id!==id; }); var el = document.getElementById('item-'+id); if (el) { if (el._tlCleanup) el._tlCleanup(); if (el._cleanup) el._cleanup(); el.remove(); } saveBoard(); deleteItemFromFirebase(id); }

// ═══ Media ═══
function playMedia(el, item) {
  var icon = el.querySelector('.play-icon'); var media = el.querySelector('video, audio');
  if (el.classList.contains('playing')) { el.classList.remove('playing'); if (item.type==='audio') { if (icon) icon.innerHTML='&#x1F3B5;'; } else { if (icon) icon.innerHTML='&#9654;'; } if (media) { media.pause(); stopTimeline(el); } return; }
  el.classList.add('playing'); if (icon) icon.innerHTML='&#x23F8;';
  if (item.type==='video' && item.subtype!=='local') { var iframe=el.querySelector('iframe'); if (iframe) { var s=iframe.src; if (s.indexOf('autoplay=1')===-1) iframe.src=s+(s.indexOf('?')===-1?'?':'&')+'autoplay=1'; } }
  else if (media) { startTimeline(el, media); media.play().catch(function() { if (icon) icon.innerHTML='&#x23F8;'; }); }
}
function formatTime(sec) { if (isNaN(sec)||!isFinite(sec)) return '0:00'; var m=Math.floor(sec/60), s=Math.floor(sec%60); return m+':'+(s<10?'0':'')+s; }
function startTimeline(el, media) {
  function ol() { var d=el.querySelector('.tl-duration'); if (d&&media.duration&&isFinite(media.duration)) d.textContent=formatTime(media.duration); }
  media.addEventListener('loadedmetadata', ol); if (media.duration&&isFinite(media.duration)) ol();
  function ot() { var p=el.querySelector('.tl-progress'), t=el.querySelector('.tl-thumb'), c=el.querySelector('.tl-current'); if (!media.duration||!isFinite(media.duration)) return; var pct=(media.currentTime/media.duration)*100; if (p) p.style.width=pct+'%'; if (t) t.style.left=pct+'%'; if (c) c.textContent=formatTime(media.currentTime); }
  media.addEventListener('timeupdate', ot);
  var track=el.querySelector('.tl-track'), td=false;
  function otd(e) { if (!media.duration||!isFinite(media.duration)) return; e.preventDefault(); e.stopPropagation(); td=true; var r=track.getBoundingClientRect(), pct=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width)); media.currentTime=pct*media.duration; }
  function otm(e) { if (!td) return; var r=track.getBoundingClientRect(), pct=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width)); media.currentTime=pct*media.duration; }
  function otu() { td=false; }
  if (track) { track.addEventListener('mousedown', otd); track.addEventListener('touchstart', otd, {passive:false}); }
  document.addEventListener('mousemove', otm); document.addEventListener('mouseup', otu); document.addEventListener('touchmove', otm, {passive:false}); document.addEventListener('touchend', otu);
  el._tlCleanup = function() { media.removeEventListener('loadedmetadata', ol); media.removeEventListener('timeupdate', ot); if (track) { track.removeEventListener('mousedown', otd); track.removeEventListener('touchstart', otd); } document.removeEventListener('mousemove', otm); document.removeEventListener('mouseup', otu); document.removeEventListener('touchmove', otm); document.removeEventListener('touchend', otu); };
}
function stopTimeline(el) { if (el._tlCleanup) { el._tlCleanup(); el._tlCleanup=null; } }
function getVideoEmbed(url, w, h) {
  if (!url) return null; var m;
  m=url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([\w-]+)/); if (m) return '<iframe width="'+w+'" height="'+h+'" src="https://www.youtube.com/embed/'+m[1]+'?vq=hd720" allowfullscreen></iframe>';
  m=url.match(/bilibili\.com\/video\/(BV[\w]+|av\d+)/); if (m) return '<iframe width="'+w+'" height="'+h+'" src="https://player.bilibili.com/player.html?bvid='+m[1]+'" allowfullscreen></iframe>';
  m=url.match(/vimeo\.com\/(\d+)/); if (m) return '<iframe width="'+w+'" height="'+h+'" src="https://player.vimeo.com/video/'+m[1]+'" allowfullscreen></iframe>';
  return null;
}

// ═══ Persistence ═══
var BOARD_KEY='family_whiteboard_v2', DRAWINGS_KEY='family_whiteboard_drawings_v2';
function startFirebaseListeners() {
  if (!firebaseReady) return;
  itemsRef.on('child_added', function(snap) { var it=snap.val(); if (pendingWrites[it.id]) { delete pendingWrites[it.id]; return; } if (document.getElementById('item-'+it.id)) return; items.push(it); renderItem(it); if (it.z>=zCounter) zCounter=it.z+1; });
  itemsRef.on('child_changed', function(snap) { var it=snap.val(), el=document.getElementById('item-'+it.id); if (el) { el.style.left=it.x+'px'; el.style.top=it.y+'px'; el.style.zIndex=it.z; var s=it.scale||1; el.style.transform='scale('+s+')'; var idx=items.findIndex(function(i) { return i.id===it.id; }); if (idx>=0) { items[idx].x=it.x; items[idx].y=it.y; items[idx].z=it.z; items[idx].scale=s; } } });
  itemsRef.on('child_removed', function(snap) { var id=snap.val().id; items=items.filter(function(i) { return i.id!==id; }); var el=document.getElementById('item-'+id); if (el) { if (el._tlCleanup) el._tlCleanup(); if (el._cleanup) el._cleanup(); el.remove(); } });
  drawingsRef.on('value', function(snap) { drawings=[]; snap.forEach(function(c) { drawings.push(c.val()); }); redrawCanvas(); });
}
function saveBoard() {
  var data = items.map(function(i) { return { id:i.id, type:i.type, x:i.x, y:i.y, z:i.z, content:i.content||'', src:i.src||'', url:i.url||'', subtype:i.subtype||'', filename:i.filename||'', memberId:i.memberId, scale:i.scale||1 }; });
  try { localStorage.setItem(BOARD_KEY, JSON.stringify(data)); } catch(e) {}
  if (firebaseReady && itemsRef && items.length>0) {
    var last = items[items.length-1];
    pendingWrites[last.id] = true;
    itemsRef.child(last.id).set({ id:last.id, type:last.type, x:last.x, y:last.y, z:last.z, content:last.content||'', src:last.src||'', url:last.url||'', subtype:last.subtype||'', filename:last.filename||'', memberId:last.memberId }).catch(function() {});
  }
}
function saveItemToFirebase(item) {
  try { localStorage.setItem(BOARD_KEY, JSON.stringify(items.map(function(i) { return { id:i.id, type:i.type, x:i.x, y:i.y, z:i.z, content:i.content||'', src:i.src||'', url:i.url||'', subtype:i.subtype||'', filename:i.filename||'', memberId:i.memberId, scale:i.scale||1 }; }))); } catch(e) {}
  if (firebaseReady && itemsRef) itemsRef.child(item.id).update({ x:item.x, y:item.y, z:item.z, scale:item.scale||1 }).catch(function() {});
}
function deleteItemFromFirebase(id) { if (firebaseReady && itemsRef) itemsRef.child(id).remove().catch(function() {}); }
function saveDrawings() { drawings.push(canvas.toDataURL()); var idx=drawings.length-1; try { localStorage.setItem(DRAWINGS_KEY, JSON.stringify(drawings)); } catch(e) {} if (firebaseReady && drawingsRef) drawingsRef.child('d'+idx).set(drawings[idx]).catch(function() {}); }
function loadBoardLocal() {
  var raw = localStorage.getItem(BOARD_KEY); if (!raw) raw = localStorage.getItem('family_whiteboard_data');
  try { if (raw) { items = JSON.parse(raw); zCounter = Math.max.apply(null, items.map(function(i) { return i.z||0; }).concat([10])) + 1; } } catch(e) { items=[]; }
  try { var rd = localStorage.getItem(DRAWINGS_KEY); if (!rd) rd=localStorage.getItem('family_whiteboard_drawings'); if (rd) drawings=JSON.parse(rd); } catch(e) { drawings=[]; }
  clearBoardDOM(); items.forEach(function(it) { renderItem(it); }); redrawCanvas();
}

// ═══ Hotkeys ═══
document.addEventListener('keydown', function(e) {
  if ((e.ctrlKey||e.metaKey) && e.key==='z') { e.preventDefault(); if (drawingMode) undoStroke(); return; }
  if (e.key==='Escape') { if (drawingMode) toggleDrawMode(); closeLightbox(); closeAllModals(); }
  if ((e.key==='Delete'||e.key==='Backspace') && !drawingMode && document.activeElement===document.body) { var sel=document.querySelector('.board-item.selected'); if (sel) { var id=parseInt(sel.id.replace('item-','')); deleteItem(id); } }
});

setupFileDrop('audDropZone','audFileInput','audPreview',function(s,f) { audPending={src:s,subtype:'local',filename:f.name}; },'audio',100);

function setupFileDrop(dzId, fiId, pvId, cb, type, maxMB) {
  var dz=document.getElementById(dzId), fi=document.getElementById(fiId), pv=document.getElementById(pvId);
  dz.onclick=function() { fi.click(); };
  fi.onchange=function(e) { var f=e.target.files[0]; if (f) pf(f); };
  dz.ondragover=function(e) { e.preventDefault(); dz.classList.add('dragover'); };
  dz.ondragleave=function() { dz.classList.remove('dragover'); };
  dz.ondrop=function(e) { e.preventDefault(); dz.classList.remove('dragover'); var f=e.dataTransfer.files[0]; if (f) pf(f); };
  function pf(f) { if (f.size>maxMB*1024*1024) { toast('文件太大了，请控制在'+maxMB+'MB以内'); return; } var r=new FileReader(); r.onload=function() { cb(r.result, f); if (type==='image') pv.innerHTML='<img src="'+r.result+'" alt="preview">'; else if (type==='video') pv.innerHTML='<video src="'+r.result+'" controls style="max-width:100%;max-height:150px;"></video>'; else if (type==='audio') pv.innerHTML='<audio src="'+r.result+'" controls style="width:100%;"></audio><div style="font-size:12px;color:#888;margin-top:4px;">'+escapeHtml(f.name)+'</div>'; }; r.readAsDataURL(f); }
}

function undoStroke() {
  if (drawings.length === 0) return;
  drawings.pop();
  // Save updated array to localStorage
  try { localStorage.setItem(DRAWINGS_KEY, JSON.stringify(drawings)); } catch(e) {}
  // Remove last entry from Firebase
  if (firebaseReady && drawingsRef) {
    drawingsRef.child('d' + drawings.length).remove().catch(function() {});
  }
  redrawCanvas();
}

// Draw controls
document.getElementById('btnDraw').onclick=toggleDrawMode;
document.getElementById('btnDrawDone').onclick=toggleDrawMode;
document.getElementById('btnUndo').onclick=function() { undoStroke(); };
document.getElementById('btnEraser').onclick=function() { isErasing=!isErasing; this.classList.toggle('active',isErasing); if (isErasing) document.querySelectorAll('.color-swatch').forEach(function(s) { s.classList.remove('selected'); }); };
document.getElementById('brushSize').oninput=function() { brushSize=parseInt(this.value); };

// Clear
document.getElementById('btnClear').onclick=function() {
  if (!confirm('确定要清空白板吗？')) return;
  // Detach Firebase listeners temporarily
  if (firebaseReady && itemsRef) { itemsRef.remove().catch(function(){}); }
  if (firebaseReady && drawingsRef) { drawingsRef.remove().catch(function(){}); }
  // Clear local state
  items.forEach(function(it) {
    var el = document.getElementById('item-' + it.id);
    if (el) { if (el._tlCleanup) el._tlCleanup(); if (el._cleanup) el._cleanup(); el.remove(); }
  });
  items = [];
  drawings = [];
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  saveBoard();
  toast('白板已清空');
};
document.querySelectorAll('.modal-overlay').forEach(function(o) { o.onclick=function(e) { if (e.target===this) this.classList.remove('show'); }; });

// Canvas
canvas.addEventListener('mousedown', startStroke); canvas.addEventListener('mousemove', continueStroke); canvas.addEventListener('mouseup', finishStroke); canvas.addEventListener('mouseleave', finishStroke);
canvas.addEventListener('touchstart', function(e) { if (!drawingMode) return; e.preventDefault(); var r=canvas.getBoundingClientRect(); lastX=(e.touches[0].clientX-r.left)/boardZoom + board.scrollLeft/boardZoom; lastY=(e.touches[0].clientY-r.top)/boardZoom + board.scrollTop/boardZoom; isDrawing=true; }, {passive:false});
canvas.addEventListener('touchmove', function(e) { if (!isDrawing||!drawingMode) return; e.preventDefault(); var r=canvas.getBoundingClientRect(), x=(e.touches[0].clientX-r.left)/boardZoom + board.scrollLeft/boardZoom, y=(e.touches[0].clientY-r.top)/boardZoom + board.scrollTop/boardZoom; ctx.lineWidth=isErasing?brushSize*3:brushSize; ctx.lineCap='round'; ctx.lineJoin='round'; ctx.strokeStyle=isErasing?'#fdfaf6':drawColor; ctx.globalCompositeOperation=isErasing?'destination-out':'source-over'; ctx.beginPath(); ctx.moveTo(lastX,lastY); ctx.lineTo(x,y); ctx.stroke(); lastX=x; lastY=y; }, {passive:false});
canvas.addEventListener('touchend', finishStroke); canvas.addEventListener('touchcancel', finishStroke);

// ═══ Board-level pinch-to-zoom (empty area) ═══
var boardZoom = 1, bPinch = false, bDist0, bZoom0, bCx, bCy;
function bd(a, b) { var dx = a.clientX - b.clientX, dy = a.clientY - b.clientY; return Math.sqrt(dx*dx + dy*dy); }

board.addEventListener('touchstart', function(e) {
  if (drawingMode) return;
  if (e.target.closest('.board-item')) return;
  if (e.touches.length === 2) {
    e.preventDefault();
    bPinch = true;
    bDist0 = bd(e.touches[0], e.touches[1]);
    bZoom0 = boardZoom;
    bCx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
    bCy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
  }
}, { passive: false });

board.addEventListener('touchmove', function(e) {
  if (!bPinch) return;
  if (e.touches.length < 2) { bPinch = false; return; }
  e.preventDefault();
  var d = bd(e.touches[0], e.touches[1]);
  // Slow down zoom sensitivity (dampen to 25%)
  var ratio = d / bDist0;
  ratio = 1 + (ratio - 1) * 0.25;
  var z = Math.max(0.5, Math.min(3, bZoom0 * ratio));
  var cx2 = (e.touches[0].clientX + e.touches[1].clientX) / 2;
  var cy2 = (e.touches[0].clientY + e.touches[1].clientY) / 2;
  // Keep pinch center stable
  var sx = board.scrollLeft + bCx, sy = board.scrollTop + bCy;
  boardZoom = z;
  boardInner.style.transform = 'scale(' + z + ')';
  board.scrollLeft = sx * (z / bZoom0) - bCx;
  board.scrollTop = sy * (z / bZoom0) - bCy;
  bZoom0 = z; bCx = cx2; bCy = cy2;
}, { passive: false });

board.addEventListener('touchend', function(e) {
  if (bPinch && e.touches.length < 2) { bPinch = false; }
});
board.addEventListener('touchcancel', function() { bPinch = false; });

function escapeHtml(s) { var d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

document.addEventListener('paste', function(e) {
  if (drawingMode) return; if (document.querySelector('.modal-overlay.show')) return;
  var ci=e.clipboardData&&e.clipboardData.items; if (!ci) return;
  for (var i=0;i<ci.length;i++) { if (ci[i].type.startsWith('image/')) { e.preventDefault(); var b=ci[i].getAsFile(), r=new FileReader(); r.onload=function() { createBoardItem('image',{src:r.result,memberId:currentMember.id}); toast('图片已粘贴'); }; r.readAsDataURL(b); break; } }
});

// ═══ Boot ═══
buildColorSwatches(); buildLoginScreen();
var saved = null; try { saved = localStorage.getItem('whiteboard_login'); } catch(e) {}
if (saved) {
  var found = members.find(function(m) { return m.id===saved; });
  if (found) { loggedIn=true; currentMember=found; loginScreen.classList.add('hidden'); document.getElementById('currentUserTag').textContent=found.name; document.getElementById('currentUserTag').style.color=found.color; document.getElementById('memberPick').style.display='none'; document.getElementById('btnChangePw').style.display=''; init(); }
  else { document.getElementById('btnLogout').style.display='none'; document.getElementById('btnChangePw').style.display='none'; }
} else { document.getElementById('btnLogout').style.display='none'; document.getElementById('btnChangePw').style.display='none'; }
